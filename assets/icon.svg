<svg width="128" height="128" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Definitions for Gradients and Filters -->
    <defs>
        <filter id="dropShadow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
            <feOffset dx="4" dy="8" result="offsetblur"/>
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.4"/>
            </feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>

        <!-- Concrete Gradients -->
        <linearGradient id="concreteLight" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E0E0E0"/>
            <stop offset="100%" stop-color="#C2C2C2"/>
        </linearGradient>
        <linearGradient id="concreteDark" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#9E9E9E"/>
            <stop offset="100%" stop-color="#757575"/>
        </linearGradient>
        <linearGradient id="concreteSide" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#BDBDBD"/>
            <stop offset="100%" stop-color="#9E9E9E"/>
        </linearGradient>

        <!-- Pin & Gold Gradients -->
        <linearGradient id="pinGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#FF5252"/>
            <stop offset="100%" stop-color="#C62828"/>
        </linearGradient>
        <linearGradient id="goldGradient" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#FFD700"/>
            <stop offset="30%" stop-color="#FFC107"/>
            <stop offset="100%" stop-color="#B8860B"/>
        </linearGradient>
    </defs>

    <!-- GROUP: THE CM BASE (Reconstructed to match Creating Team Logo) -->
    <g filter="url(#dropShadow)" transform="translate(0, 40)">

        <!-- === LEFT BLOCK (The 'C') === -->
        <!-- Inner depth of C (Darkest) -->
        <path d="M120 180 L120 380 L100 370 L100 190 Z" fill="#616161"/>

        <!-- Left Face of C (Main visible C shape) -->
        <!-- Points: Top-Out, Bottom-Out, Bottom-In, C-Bottom-Inner, C-Top-Inner, Top-In -->
        <path d="M40 140 L40 380 L140 430 L140 160 L100 140 Z" fill="none"/> <!-- Reference box -->

        <!-- Actual C Shape Face -->
        <path d="M40 140 L120 180 L120 400 L40 360 Z" fill="url(#concreteSide)" stroke="#424242" stroke-width="2"/> <!-- Backing for C -->

        <!-- The "Hollow" C effect using overlay -->
        <path d="M40 140 L120 180 L120 400 L40 360 Z" fill="url(#concreteSide)"/>
        <path d="M60 190 L100 210 L100 330 L60 310 Z" fill="#505050"/> <!-- The hole in the C -->

        <!-- Top of Left Block -->
        <path d="M40 140 L140 90 L220 130 L120 180 Z" fill="url(#concreteLight)" stroke="#424242" stroke-width="2"/>

        <!-- Right Face of Left Block (Facing the gap) -->
        <path d="M120 180 L220 130 L220 350 L120 400 Z" fill="url(#concreteDark)" stroke="#424242" stroke-width="2"/>


        <!-- === RIGHT BLOCK (The Leaf Holder) === -->
        <!-- Shifted right by gap -->
        <g transform="translate(210, -20)">
            <!-- Left Face of Right Block (Facing the gap) -->
            <path d="M20 150 L120 100 L120 320 L20 370 Z" fill="url(#concreteDark)" stroke="#424242" stroke-width="2"/>

            <!-- Top Face of Right Block -->
            <path d="M20 150 L120 100 L240 160 L140 210 Z" fill="url(#concreteLight)" stroke="#424242" stroke-width="2"/>

            <!-- Right Face of Right Block (Display Face) -->
            <path d="M140 210 L240 160 L240 380 L140 430 Z" fill="url(#concreteSide)" stroke="#424242" stroke-width="2"/>

            <!-- === THE GOLD LEAF (Restored) === -->
            <g transform="translate(160, 240) skewY(26) scale(0.9)">
                <!-- Monstera Leaf Shape -->
                <path d="M0 0
                  C 40 -40, 90 10, 80 50
                  C 75 70, 50 90, 20 80
                  C -10 70, -30 40, 0 0 Z"
                      fill="url(#goldGradient)" stroke="#4E342E" stroke-width="2"/>
                <!-- Leaf Cuts/Details -->
                <path d="M40 10 L50 20 L40 30" fill="#BDBDBD" stroke="none" opacity="0.3"/> <!-- Shine -->
                <path d="M40 80 L40 10" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/> <!-- Stem -->
                <path d="M40 50 L70 40" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
                <path d="M40 30 L10 20" stroke="#4E342E" stroke-width="2" stroke-linecap="round"/>
            </g>

            <!-- Text: Creating 工程组 -->
            <g transform="translate(150, 380) rotate(-26)">
                <text x="0" y="0" font-family="'Microsoft YaHei', Arial, sans-serif" font-weight="bold" font-size="16" fill="#424242">Creating</text>
                <text x="10" y="20" font-family="'Microsoft YaHei', Arial, sans-serif" font-weight="bold" font-size="12" fill="#616161">工程组</text>
            </g>
        </g>
    </g>

    <!-- GROUP: MTR RAILS (Integrated into the top) -->
    <!-- The rails now run across the top of the two blocks like a bridge -->
    <g transform="translate(20, 30)">
        <!-- Ballast / Bed -->
        <path d="M100 130 L350 130 L310 150 L60 150 Z" fill="#5D4037" opacity="0.9"/>

        <!-- Sleepers (Wood ties) -->
        <path d="M110 132 L100 148" stroke="#3E2723" stroke-width="6"/>
        <path d="M150 132 L140 148" stroke="#3E2723" stroke-width="6"/>
        <path d="M190 132 L180 148" stroke="#3E2723" stroke-width="6"/>
        <path d="M230 132 L220 148" stroke="#3E2723" stroke-width="6"/>
        <path d="M270 132 L260 148" stroke="#3E2723" stroke-width="6"/>

        <!-- Rails (Steel) -->
        <path d="M80 136 L340 136" stroke="#90A4AE" stroke-width="4"/>
        <path d="M70 144 L330 144" stroke="#90A4AE" stroke-width="4"/>
    </g>


    <!-- GROUP: XAERO MAP PIN (The Focus) -->
    <!-- Floating above the structure -->
    <g filter="url(#dropShadow)" transform="translate(0, -20)">
        <!-- Pin Body -->
        <path d="M256 50 C190 50 136 104 136 170 C136 240 256 370 256 370 C256 370 376 240 376 170 C376 104 322 50 256 50 Z" fill="url(#pinGradient)" stroke="#B71C1C" stroke-width="3"/>

        <!-- Pin Inner Circle -->
        <circle cx="256" cy="170" r="75" fill="white"/>

        <!-- Icon Inside Pin: MTR Train -->
        <g transform="translate(0, -10)">
            <path d="M226 150 L286 150 C291 150 296 154 296 160 L296 200 C296 206 291 210 286 210 L226 210 C221 210 216 206 216 200 L216 160 C216 154 221 150 226 150 Z" fill="#1976D2"/>
            <rect x="226" y="210" width="60" height="15" fill="#424242"/>
            <circle cx="236" cy="218" r="5" fill="#FFEB3B"/>
            <circle cx="276" cy="218" r="5" fill="#FFEB3B"/>
            <path d="M226 150 L236 130 L276 130 L286 150" fill="#1976D2" opacity="0.6"/>
        </g>
    </g>

</svg>